{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="glass-card auth-card">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='images/pr1.png') }}" alt="Logo">
        </div>
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your email to receive reset instructions</p>

        {% for cat, msg in get_flashed_messages(with_categories=true) %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-envelope"></i> Send Reset Link
            </button>
        </form>
        <div class="auth-links"><a href="{{ url_for('home.login') }}"><i class="bi bi-arrow-left"></i> Back to Login</a></div>
    </div>
</div>
{% endblock %}
